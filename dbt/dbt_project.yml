name: "cea_aw"
version: "1.0.0"
config-version: 2

# Profile de conexão definido em dbt_profiles/profiles.yml
profile: "cea_aw"

# Caminhos dos arquivos do projeto
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Configuração de materialização dos modelos
# Cada camada tem uma estratégia diferente:
models:
  cea_aw:
    # Camada staging: views temporárias, perto dos dados brutos
    staging:
      +materialized: view
      +schema: staging

    # Camada intermediate: transformações intermediárias
    intermediate:
      +materialized: view
      +schema: intermediate

    # Camada marts: tabelas fatos e dimensões finais (tabelas físicas)
    marts:
      +materialized: table
      +schema: marts
