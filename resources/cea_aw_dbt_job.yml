# Job definition para executar o projeto dbt no Databricks
# Docs: https://docs.databricks.com/dev-tools/bundles/resources.html

resources:
  jobs:
    cea_aw_dbt_job:
      name: cea_aw_dbt_job

      tasks:
        - task_key: dbt_build
          dbt_task:
            # Caminho relativo ao diretório do projeto dbt
            project_directory: ../dbt
            # Caminho relativo ao diretório com o profiles.yml
            profiles_directory: ../dbt_profiles
            commands:
              - "dbt deps"
              - "dbt build"
            warehouse_id: b83ff5bf59f6214a

          # Cluster serverless para execução do dbt
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"

      # Para agendar execuções automáticas, descomente abaixo:
      # schedule:
      #   quartz_cron_expression: "0 0 8 * * ?"
      #   timezone_id: America/Sao_Paulo

      # Notificações por email em caso de falha (opcional):
      # email_notifications:
      #   on_failure:
      #     - yuribschneider@gmail.com
